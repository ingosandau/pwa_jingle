<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f0f1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Sascha's Nipples">
  <link rel="manifest" href="manifest.json">
  <title>Sascha's Nipples</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f0f1a;
      --surface: #1a1a2e;
      --text:    #e0e0ff;
      --muted:   #7878aa;
      --c0: #6c63ff;
      --c1: #ff6b8a;
      --c2: #34d399;
    }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      background: var(--bg);
      font-family: system-ui, -apple-system, sans-serif;
      color: var(--text);
      padding: 1.5rem;
    }

    h1 {
      font-size: clamp(1.2rem, 5vw, 1.7rem);
      font-weight: 300;
      letter-spacing: 0.12em;
      opacity: 0.8;
      text-align: center;
    }

    /* ── Pads ─────────────────────────────────────────────────────────── */
    .pads {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      max-width: 400px;
    }

    .pad-row {
      display: flex;
      align-items: center;
      gap: 0.7rem;
    }

    .pad {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1.1rem 1.3rem;
      border-radius: 18px;
      border: none;
      cursor: pointer;
      background: var(--color);
      box-shadow: 0 4px 22px color-mix(in srgb, var(--color) 35%, transparent);
      transition: transform 0.12s ease, box-shadow 0.2s ease;
      -webkit-tap-highlight-color: transparent;
      outline: none;
      text-align: left;
    }
    .pad:active       { transform: scale(0.95); }
    .pad:focus-visible { outline: 2px solid #fff; outline-offset: 3px; }
    .pad.playing {
      animation: pad-pulse 0.32s ease;
      box-shadow: 0 4px 44px color-mix(in srgb, var(--color) 65%, transparent);
    }
    @keyframes pad-pulse {
      0%   { transform: scale(1);    }
      38%  { transform: scale(0.92); }
      68%  { transform: scale(1.04); }
      100% { transform: scale(1);    }
    }

    .pad-icon {
      width: 26px;
      height: 26px;
      fill: #ffffffdd;
      flex-shrink: 0;
    }

    .pad-text { flex: 1; min-width: 0; }

    .pad-label {
      font-size: 1rem;
      font-weight: 600;
      color: #ffffffee;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pad-sub {
      font-size: 0.72rem;
      font-weight: 400;
      color: #ffffff99;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .gear-btn {
      width: 40px;
      height: 40px;
      flex-shrink: 0;
      border-radius: 50%;
      border: 1px solid #ffffff1a;
      background: #ffffff0a;
      color: var(--muted);
      font-size: 1.05rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .gear-btn:hover  { background: #ffffff1e; color: var(--text); }
    .gear-btn:active { background: #ffffff2a; }

    /* ── Bottom sheet ────────────────────────────────────────────────── */
    .overlay {
      position: fixed;
      inset: 0;
      background: #00000088;
      backdrop-filter: blur(4px);
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .overlay.open { opacity: 1; pointer-events: all; }

    .sheet {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-radius: 22px 22px 0 0;
      padding: 0 1.5rem 2rem;
      z-index: 11;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
      max-width: 480px;
      margin: 0 auto;
    }
    .sheet.open { transform: translateY(0); }

    .sheet-handle {
      width: 40px;
      height: 4px;
      background: #ffffff28;
      border-radius: 2px;
      margin: 1.1rem auto 1.4rem;
    }

    .sheet-title {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 1.4rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .title-dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .field { margin-bottom: 1.1rem; }

    .field label {
      display: block;
      font-size: 0.75rem;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.45rem;
    }

    input[type="text"] {
      width: 100%;
      padding: 0.7rem 0.9rem;
      background: #ffffff0d;
      border: 1px solid #ffffff1e;
      border-radius: 11px;
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: #6c63ff70; }

    .file-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.7rem 0.9rem;
      background: #ffffff0d;
      border: 1px solid #ffffff1e;
      border-radius: 11px;
    }

    .file-display {
      flex: 1;
      font-size: 0.88rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .file-display.has-file { color: var(--text); }

    .choose-btn {
      padding: 0.32rem 0.8rem;
      background: #6c63ff;
      border: none;
      border-radius: 7px;
      color: #fff;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      flex-shrink: 0;
    }

    .sheet-actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.5rem;
    }

    .btn-secondary {
      flex: 1;
      padding: 0.75rem;
      border-radius: 12px;
      border: none;
      background: #ffffff0f;
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-primary {
      flex: 1;
      padding: 0.75rem;
      border-radius: 12px;
      border: none;
      background: #6c63ff;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
    }

    /* ── Install button ──────────────────────────────────────────────── */
    #install-btn {
      position: fixed;
      bottom: 1.6rem;
      background: #ffffff12;
      border: 1px solid #ffffff22;
      color: var(--text);
      padding: 0.5rem 1.3rem;
      border-radius: 99px;
      font-size: 0.82rem;
      cursor: pointer;
      display: none;
      backdrop-filter: blur(10px);
    }
  </style>
</head>
<body>

  <h1>Sascha's Nipples</h1>

  <div class="pads" id="pads"></div>

  <!-- Overlay -->
  <div class="overlay" id="overlay"></div>

  <!-- Settings bottom sheet -->
  <div class="sheet" id="sheet" role="dialog" aria-modal="true" aria-labelledby="sheet-title">
    <div class="sheet-handle"></div>
    <div class="sheet-title">
      <span class="title-dot" id="title-dot"></span>
      <span id="sheet-title">Configure</span>
    </div>

    <div class="field">
      <label for="name-input">Button label</label>
      <input type="text" id="name-input" maxlength="32" placeholder="e.g. Bing Bong">
    </div>

    <div class="field">
      <label>Sound file</label>
      <div class="file-row">
        <span class="file-display" id="file-display">Default jingle</span>
        <button class="choose-btn" id="choose-btn">Choose MP3</button>
      </div>
      <input type="file" id="file-input" accept="audio/*" style="display:none">
    </div>

    <div class="sheet-actions">
      <button class="btn-secondary" id="clear-btn">Clear sound</button>
      <button class="btn-primary"   id="save-btn">Save</button>
    </div>
  </div>

  <button id="install-btn">&#8853; Add to Home Screen</button>

  <script>
    // ── Service Worker ────────────────────────────────────────────────────────
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }

    // ── IndexedDB (stores audio blobs keyed by pad index 0‥2) ─────────────────
    const DB = (() => {
      const DB_NAME = 'saschas-nipples';
      let _db = null;
      function open() {
        if (_db) return Promise.resolve(_db);
        return new Promise((res, rej) => {
          const r = indexedDB.open(DB_NAME, 1);
          r.onupgradeneeded = e => e.target.result.createObjectStore('pads');
          r.onsuccess = e => { _db = e.target.result; res(_db); };
          r.onerror   = e => rej(e.target.error);
        });
      }
      async function get(key) {
        const db = await open();
        return new Promise((res, rej) => {
          const r = db.transaction('pads').objectStore('pads').get(key);
          r.onsuccess = e => res(e.target.result);
          r.onerror   = e => rej(e.target.error);
        });
      }
      async function put(key, val) {
        const db = await open();
        return new Promise((res, rej) => {
          const tx = db.transaction('pads', 'readwrite');
          tx.objectStore('pads').put(val, key);
          tx.oncomplete = res;
          tx.onerror    = e => rej(e.target.error);
        });
      }
      async function del(key) {
        const db = await open();
        return new Promise((res, rej) => {
          const tx = db.transaction('pads', 'readwrite');
          tx.objectStore('pads').delete(key);
          tx.oncomplete = res;
          tx.onerror    = e => rej(e.target.error);
        });
      }
      return { get, put, del };
    })();

    // ── Default synthesised jingles ───────────────────────────────────────────
    // Each entry: [freq_Hz, startSec, durSec, volume]
    const JINGLES = [
      // 0 — ascending C-major arpeggio + chord (purple)
      [[523.25,0.00,0.13,0.42],[659.25,0.13,0.13,0.42],[783.99,0.26,0.13,0.42],
       [1046.5,0.39,0.22,0.48],[783.99,0.61,0.10,0.36],[880.00,0.71,0.10,0.36],
       [783.99,0.81,0.10,0.36],[659.25,0.91,0.10,0.36],
       [523.25,1.06,0.60,0.38],[659.25,1.06,0.60,0.32],
       [783.99,1.06,0.60,0.28],[1046.5,1.06,0.60,0.38]],
      // 1 — quick rising G-major fanfare (pink)
      [[392.00,0.00,0.10,0.45],[493.88,0.10,0.10,0.45],[587.33,0.20,0.10,0.45],
       [783.99,0.30,0.12,0.50],[987.77,0.42,0.50,0.55]],
      // 2 — deep bass hit rising to C chord (teal)
      [[130.81,0.00,0.18,0.55],[261.63,0.12,0.14,0.46],[392.00,0.26,0.14,0.46],
       [523.25,0.40,0.60,0.45],[659.25,0.40,0.60,0.34],[783.99,0.40,0.60,0.26]],
    ];

    const JINGLE_DURATION_MS = [1760, 950, 1050];
    const COLORS             = ['#6c63ff', '#ff6b8a', '#34d399'];
    const DEFAULT_LABELS     = ['Button 1', 'Button 2', 'Button 3'];

    // ── Persistent pad config (labels + file names) ───────────────────────────
    let pads = JSON.parse(
      localStorage.getItem('pads') ||
      JSON.stringify(DEFAULT_LABELS.map(name => ({ name, fileName: null })))
    );
    function savePads() { localStorage.setItem('pads', JSON.stringify(pads)); }

    // ── Audio engine ──────────────────────────────────────────────────────────
    let audioCtx = null;
    function getCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }

    function synthNote(ac, freq, tStart, dur, vol) {
      [[freq, vol], [freq * 2, vol * 0.1]].forEach(([f, v]) => {
        const osc = ac.createOscillator(), g = ac.createGain();
        osc.connect(g); g.connect(ac.destination);
        osc.type = 'sine'; osc.frequency.value = f;
        const t = ac.currentTime + tStart;
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(v, t + 0.018);
        g.gain.setValueAtTime(v, t + dur * 0.55);
        g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
        osc.start(t); osc.stop(t + dur + 0.05);
      });
    }

    // ── Build pad DOM ─────────────────────────────────────────────────────────
    const NOTE_SVG = `<svg class="pad-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/>
    </svg>`;

    const padsEl = document.getElementById('pads');
    const padEls = [];

    function buildPads() {
      padsEl.innerHTML = '';
      padEls.length = 0;
      COLORS.forEach((color, i) => {
        const row = document.createElement('div');
        row.className = 'pad-row';

        const pad = document.createElement('button');
        pad.className = 'pad';
        pad.style.setProperty('--color', color);
        pad.setAttribute('aria-label', `Play ${pads[i].name}`);
        pad.innerHTML = `${NOTE_SVG}
          <div class="pad-text">
            <div class="pad-label" id="lbl-${i}">${pads[i].name}</div>
            <div class="pad-sub"   id="sub-${i}">${pads[i].fileName ?? 'default jingle'}</div>
          </div>`;
        pad.addEventListener('click', () => handlePlay(i, pad));
        padEls.push(pad);

        const gear = document.createElement('button');
        gear.className = 'gear-btn';
        gear.setAttribute('aria-label', `Settings for ${pads[i].name}`);
        gear.textContent = '⚙';
        gear.addEventListener('click', () => openSheet(i));

        row.append(pad, gear);
        padsEl.appendChild(row);
      });
    }

    async function handlePlay(i, padEl) {
      padEl.classList.add('playing');
      setTimeout(() => padEl.classList.remove('playing'), JINGLE_DURATION_MS[i]);

      try {
        const stored = await DB.get(i);
        if (stored?.blob) {
          const url   = URL.createObjectURL(stored.blob);
          const audio = new Audio(url);
          audio.addEventListener('ended', () => URL.revokeObjectURL(url));
          audio.addEventListener('error', () => URL.revokeObjectURL(url));
          await audio.play();
          return;
        }
      } catch { /* fall through to synth */ }

      const ac = getCtx();
      JINGLES[i].forEach(([f, t, d, v]) => synthNote(ac, f, t, d, v));
    }

    // ── Settings sheet ────────────────────────────────────────────────────────
    const overlay    = document.getElementById('overlay');
    const sheet      = document.getElementById('sheet');
    const titleDot   = document.getElementById('title-dot');
    const sheetTitle = document.getElementById('sheet-title');
    const nameInput  = document.getElementById('name-input');
    const fileInput  = document.getElementById('file-input');
    const fileDisp   = document.getElementById('file-display');
    const chooseBtn  = document.getElementById('choose-btn');
    const clearBtn   = document.getElementById('clear-btn');
    const saveBtn    = document.getElementById('save-btn');

    let editIdx      = null;
    let pendingFile  = null;   // File staged this session
    let pendingClear = false;  // Clear requested this session

    function setFileDisplay(name) {
      fileDisp.textContent = name ?? 'Default jingle';
      fileDisp.classList.toggle('has-file', !!name);
    }

    function openSheet(i) {
      editIdx = i; pendingFile = null; pendingClear = false;
      titleDot.style.background = COLORS[i];
      sheetTitle.textContent    = `Button ${i + 1}`;
      nameInput.value           = pads[i].name;
      setFileDisplay(pads[i].fileName);
      overlay.classList.add('open');
      sheet.classList.add('open');
      nameInput.focus();
    }

    function closeSheet() {
      overlay.classList.remove('open');
      sheet.classList.remove('open');
      editIdx = null;
    }

    overlay.addEventListener('click', closeSheet);

    chooseBtn.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if (!file) return;
      pendingFile  = file;
      pendingClear = false;
      setFileDisplay(file.name);
      fileInput.value = '';
    });

    clearBtn.addEventListener('click', () => {
      pendingFile = null; pendingClear = true;
      setFileDisplay(null);
    });

    saveBtn.addEventListener('click', async () => {
      if (editIdx === null) return;
      const i = editIdx;

      pads[i].name = nameInput.value.trim() || DEFAULT_LABELS[i];

      if (pendingFile) {
        const blob = new Blob([await pendingFile.arrayBuffer()], { type: pendingFile.type });
        await DB.put(i, { blob });
        pads[i].fileName = pendingFile.name;
      } else if (pendingClear) {
        await DB.del(i);
        pads[i].fileName = null;
      }

      savePads();

      // Update labels in place (no full re-render needed)
      document.getElementById(`lbl-${i}`).textContent = pads[i].name;
      document.getElementById(`sub-${i}`).textContent = pads[i].fileName ?? 'default jingle';
      padEls[i].setAttribute('aria-label', `Play ${pads[i].name}`);

      closeSheet();
    });

    // ── Init ──────────────────────────────────────────────────────────────────
    buildPads();

    // ── PWA install prompt ────────────────────────────────────────────────────
    let deferred = null;
    const installBtn = document.getElementById('install-btn');
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault(); deferred = e; installBtn.style.display = 'block';
    });
    installBtn.addEventListener('click', async () => {
      if (!deferred) return;
      deferred.prompt();
      const { outcome } = await deferred.userChoice;
      if (outcome === 'accepted') installBtn.style.display = 'none';
      deferred = null;
    });
    window.addEventListener('appinstalled', () => installBtn.style.display = 'none');
  </script>
</body>
</html>
