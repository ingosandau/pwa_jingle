<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f0f1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Jingle">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>Jingle Player</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f0f1a;
      --accent:    #6c63ff;
      --glow:      #6c63ff55;
      --text:      #e0e0ff;
      --btn-size:  min(200px, 52vw);
    }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2.2rem;
      background: var(--bg);
      font-family: system-ui, -apple-system, sans-serif;
      color: var(--text);
      overflow: hidden;
      user-select: none;
    }

    h1 {
      font-size: clamp(1.1rem, 4.5vw, 1.6rem);
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.7;
    }

    /* ---- Button ---- */
    .btn-wrap { position: relative; }

    .pulse-ring {
      position: absolute;
      inset: -18px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      opacity: 0;
      pointer-events: none;
    }
    .pulse-ring.go { animation: ring 0.75s ease-out infinite; }
    @keyframes ring {
      0%   { transform: scale(1);    opacity: 0.7; }
      100% { transform: scale(1.55); opacity: 0;   }
    }

    #play-btn {
      width: var(--btn-size);
      height: var(--btn-size);
      border-radius: 50%;
      border: none;
      background: radial-gradient(circle at 38% 35%, #9b95ff, var(--accent) 70%);
      box-shadow: 0 0 42px var(--glow), 0 8px 28px #00000060;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s ease, box-shadow 0.25s ease;
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }
    #play-btn:focus-visible { outline: 3px solid var(--accent); outline-offset: 6px; }
    #play-btn:active        { transform: scale(0.92); }
    #play-btn.playing {
      box-shadow: 0 0 90px var(--accent), 0 8px 28px #00000060;
      animation: bounce 0.35s ease;
    }
    #play-btn:disabled { cursor: default; }
    @keyframes bounce {
      0%   { transform: scale(1);    }
      35%  { transform: scale(0.88); }
      65%  { transform: scale(1.06); }
      100% { transform: scale(1);    }
    }

    .note-icon {
      width: 38%;
      height: 38%;
      fill: #ffffffee;
      pointer-events: none;
      filter: drop-shadow(0 2px 5px #00000050);
      transition: transform 0.3s ease;
    }
    #play-btn.playing .note-icon { animation: spin-note 0.4s ease; }
    @keyframes spin-note {
      0%   { transform: rotate(0deg)   scale(1);    }
      50%  { transform: rotate(-15deg) scale(1.15); }
      100% { transform: rotate(0deg)   scale(1);    }
    }

    /* ---- Bars visualiser ---- */
    .bars {
      display: flex;
      gap: 7px;
      align-items: flex-end;
      height: 38px;
    }
    .bar {
      width: 7px;
      height: 7px;
      background: var(--accent);
      border-radius: 4px;
      opacity: 0.25;
      transition: opacity 0.2s;
    }
    .bars.playing .bar {
      opacity: 1;
      animation: dance var(--spd) ease-in-out infinite alternate;
    }
    .bar:nth-child(1) { --spd: 0.42s; }
    .bar:nth-child(2) { --spd: 0.58s; }
    .bar:nth-child(3) { --spd: 0.33s; }
    .bar:nth-child(4) { --spd: 0.50s; }
    .bar:nth-child(5) { --spd: 0.38s; }
    @keyframes dance {
      from { height: 7px;  }
      to   { height: 36px; }
    }

    /* ---- Status ---- */
    #status {
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      opacity: 0.4;
      min-height: 1.3em;
      transition: opacity 0.3s, color 0.3s;
    }
    #status.active { opacity: 0.9; color: #a8a3ff; }

    /* ---- Install banner ---- */
    #install-btn {
      position: fixed;
      bottom: 1.8rem;
      background: #ffffff14;
      border: 1px solid #ffffff25;
      color: var(--text);
      padding: 0.55rem 1.4rem;
      border-radius: 99px;
      font-size: 0.82rem;
      letter-spacing: 0.05em;
      cursor: pointer;
      display: none;
      backdrop-filter: blur(10px);
      transition: background 0.2s;
    }
    #install-btn:hover { background: #ffffff22; }
  </style>
</head>
<body>

  <h1>Jingle Player</h1>

  <div class="btn-wrap">
    <div class="pulse-ring" id="ring"></div>
    <button id="play-btn" aria-label="Play jingle">
      <svg class="note-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/>
      </svg>
    </button>
  </div>

  <div class="bars" id="bars">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
  </div>

  <p id="status">tap to play</p>

  <button id="install-btn" aria-label="Install app">&#8853; Add to Home Screen</button>

  <script>
    // ── Service Worker ──────────────────────────────────────────────────────
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }

    // ── Audio engine ────────────────────────────────────────────────────────
    let ctx = null;

    function getCtx() {
      if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
      if (ctx.state === 'suspended') ctx.resume();
      return ctx;
    }

    /**
     * Plays a single note with a soft attack and exponential decay.
     * Adds a quiet octave-up overtone for warmth.
     */
    function note(ac, freq, tStart, dur, vol = 0.45) {
      [[freq, vol], [freq * 2, vol * 0.12]].forEach(([f, v]) => {
        const osc  = ac.createOscillator();
        const gain = ac.createGain();
        osc.connect(gain);
        gain.connect(ac.destination);
        osc.type = 'sine';
        osc.frequency.value = f;
        const t = ac.currentTime + tStart;
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(v,     t + 0.018);
        gain.gain.setValueAtTime(v,               t + dur * 0.55);
        gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
        osc.start(t);
        osc.stop(t + dur + 0.05);
      });
    }

    // Jingle: ascending C-major arpeggio → melodic fill → C-major chord finale
    // [freq_Hz, startSec, durSec, volume]
    const JINGLE = [
      [523.25, 0.00, 0.13, 0.42],  // C5
      [659.25, 0.13, 0.13, 0.42],  // E5
      [783.99, 0.26, 0.13, 0.42],  // G5
      [1046.5, 0.39, 0.22, 0.48],  // C6
      [783.99, 0.61, 0.11, 0.36],  // G5
      [880.00, 0.72, 0.11, 0.36],  // A5
      [783.99, 0.83, 0.11, 0.36],  // G5
      [659.25, 0.94, 0.11, 0.36],  // E5
      // Final chord
      [523.25, 1.10, 0.60, 0.38],  // C5 ]
      [659.25, 1.10, 0.60, 0.34],  // E5 }  C major
      [783.99, 1.10, 0.60, 0.30],  // G5 }
      [1046.5, 1.10, 0.60, 0.38],  // C6 ]
    ];

    const TOTAL_MS = (1.10 + 0.60 + 0.08) * 1000; // ~1780 ms

    // ── UI ───────────────────────────────────────────────────────────────────
    const btn    = document.getElementById('play-btn');
    const ring   = document.getElementById('ring');
    const bars   = document.getElementById('bars');
    const status = document.getElementById('status');
    let   timer  = null;

    function setPlaying(on) {
      btn.classList.toggle('playing', on);
      ring.classList.toggle('go', on);
      bars.classList.toggle('playing', on);
      status.classList.toggle('active', on);
      status.textContent = on ? '\u266a playing\u2026' : 'tap to play';
      btn.disabled = on;
    }

    btn.addEventListener('click', () => {
      const ac = getCtx();
      JINGLE.forEach(([f, t, d, v]) => note(ac, f, t, d, v));
      setPlaying(true);
      clearTimeout(timer);
      timer = setTimeout(() => setPlaying(false), TOTAL_MS);
    });

    // ── PWA install prompt ───────────────────────────────────────────────────
    let deferred = null;
    const installBtn = document.getElementById('install-btn');

    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferred = e;
      installBtn.style.display = 'block';
    });

    installBtn.addEventListener('click', async () => {
      if (!deferred) return;
      deferred.prompt();
      const { outcome } = await deferred.userChoice;
      if (outcome === 'accepted') installBtn.style.display = 'none';
      deferred = null;
    });

    window.addEventListener('appinstalled', () => {
      installBtn.style.display = 'none';
    });
  </script>
</body>
</html>
